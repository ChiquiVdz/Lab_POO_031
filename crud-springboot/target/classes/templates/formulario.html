<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Producto</title>
</head>
<body>
    <h1 th:text="${producto.id} == null ? 'Nuevo Producto' : 'Editar Producto'"></h1>
    <form th:action="@{/productos}" th:object="${producto}" method="post">
        <input type="hidden" th:field="*{id}" />
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" required/><br/><br/>
        <label>Precio:</label>
        <input type="number" step="0.01" th:field="*{precio}" required/><br/><br/>
        <button type="submit">Guardar</button>
        <a th:href="@{/productos}">Cancelar</a>
    </form>
</body>
</html>
